<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario Laboral</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fefce8',
                            100: '#fef9c3',
                            200: '#fef08a',
                            300: '#fde047',
                            400: '#facc15', // Main Yellow
                            500: '#eab308',
                            600: '#ca8a04',
                            700: '#a16207',
                            800: '#854d0e',
                            900: '#713f12',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Day.js -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isBetween.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/es.js"></script>
    
    <!-- jsPDF & AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <!-- SheetJS (Excel) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
        
        /* Calendar Grid */
        .calendar-grid {
            position: relative;
            background-size: 100% 60px;
            background-image: linear-gradient(to bottom, #E5E7EB 1px, transparent 1px);
        }
        .time-label { transform: translateY(-50%); }
        
        .hide { display: none !important; }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Env safe area for modern mobile browsers */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    </style>
</head>
<body class="text-gray-800 h-screen flex overflow-hidden">

    <!-- Desktop Sidebar (Hidden on mobile) -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-100 z-30 shrink-0 relative">
        <div class="p-6 flex items-center gap-3">
            <div class="w-12 h-12 flex items-center justify-center shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 481.52 735.47" class="w-full h-full object-contain">
                    <path fill="#575757" d="M240.46,108.87c-94.54,0-131.59,42.14-131.59,150.72V521.44l82.34-40V417.29l141-68.48c33.94-17.79,40.45-33,40.45-58.44V259.59C372.65,151,335.61,108.87,240.46,108.87Zm49.77,177.57-99,48.09V266.61c0-70.22,11.5-91.29,49.86-91.29,37.66,0,49.16,21.07,49.16,91.29Z"/>
                    <path fill="#ffd44b" d="M290.23,391.49v77.37c0,70.22-11.5,91.38-49.16,91.38-38.36,0-49.86-1.52-49.86-58.79l-82.34,40v3.31c0,50,37,81.85,131.59,81.85,95.15,0,132.19-42.13,132.19-150.72V336.31c0,14.08-25.46,27.52-43.92,36.45C308.5,382.56,290.23,391.49,290.23,391.49Z"/>
                </svg>
            </div>
            <h1 class="font-bold text-xl tracking-tight leading-tight">Diario<br>Laboral</h1>
        </div>

        <div class="px-4 mb-6">
            <button onclick="openTaskModal()" class="w-full bg-brand-400 hover:bg-brand-500 text-brand-900 font-semibold py-3 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-colors duration-200">
                <i class="ph-bold ph-plus"></i> Nueva Tarea
            </button>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <button onclick="navigate('calendar')" id="nav-calendar" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-brand-900 bg-brand-50 transition-colors">
                <i class="ph ph-calendar-blank text-xl"></i> Calendario
            </button>
            <button onclick="navigate('reports')" id="nav-reports" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="ph ph-chart-bar text-xl"></i> Informes
            </button>
            <button onclick="navigate('settings')" id="nav-settings" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="ph ph-gear text-xl"></i> Configuración
            </button>
        </nav>
    </aside>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 z-40 flex justify-around items-center px-2 py-1 pb-safe shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)]">
        <button onclick="navigate('calendar')" id="nav-mob-calendar" class="text-brand-600 flex flex-col items-center p-2 w-16 transition-colors">
            <i id="icon-mob-calendar" class="ph-fill ph-calendar-blank text-[26px]"></i>
            <span class="text-[10px] mt-1 font-medium">Diario</span>
        </button>
        
        <button onclick="navigate('reports')" id="nav-mob-reports" class="text-gray-400 flex flex-col items-center p-2 w-16 transition-colors">
            <i id="icon-mob-reports" class="ph ph-chart-bar text-[26px]"></i>
            <span class="text-[10px] mt-1 font-medium">Informes</span>
        </button>
        
        <!-- Floating Action Button (FAB) Mobile -->
        <div class="relative -top-6">
            <button onclick="openTaskModal()" class="w-14 h-14 bg-brand-400 text-brand-900 rounded-full shadow-lg flex items-center justify-center text-2xl border-4 border-white transition-transform active:scale-95">
                <i class="ph-bold ph-plus"></i>
            </button>
        </div>

        <button onclick="navigate('settings')" id="nav-mob-settings" class="text-gray-400 flex flex-col items-center p-2 w-16 transition-colors">
            <i id="icon-mob-settings" class="ph ph-gear text-[26px]"></i>
            <span class="text-[10px] mt-1 font-medium">Ajustes</span>
        </button>
    </nav>

    <!-- Main Content Area -->
    <!-- Added pb-[72px] to ensure content scrolls past the bottom mobile nav -->
    <main class="flex-1 flex flex-col h-full bg-[#FAFAFA] relative pb-[72px] md:pb-0 overflow-hidden">
        
        <!-- Active Timer Banner -->
        <div id="active-timer-banner" class="hide bg-brand-400 text-brand-900 px-4 md:px-6 py-3 flex items-center justify-between shadow-sm z-20 shrink-0">
            <div class="flex items-center gap-2 md:gap-3">
                <div class="animate-pulse bg-brand-900 w-2 h-2 rounded-full shrink-0"></div>
                <span class="font-semibold text-sm md:text-base truncate max-w-[120px] md:max-w-none" id="active-timer-title">Tarea en curso...</span>
                <span class="font-mono bg-white/40 px-2 py-0.5 rounded text-xs md:text-sm" id="active-timer-display">00:00:00</span>
            </div>
            <button onclick="stopTimer()" class="bg-brand-900 text-brand-50 hover:bg-black px-3 md:px-4 py-1.5 rounded-lg text-xs md:text-sm font-medium transition-colors flex items-center gap-1 md:gap-2 shadow-sm shrink-0">
                <i class="ph-fill ph-stop"></i> Finalizar
            </button>
        </div>

        <!-- View: Calendar -->
        <div id="view-calendar" class="flex-1 flex flex-col h-full overflow-hidden">
            <!-- Header -->
            <div class="flex items-center justify-between px-4 md:px-6 py-3 md:py-4 bg-white border-b border-gray-100 shrink-0">
                <div class="flex items-center gap-2 md:gap-4">
                    <button onclick="changeDate(-1)" class="p-2 hover:bg-gray-100 rounded-lg text-gray-600 transition-colors"><i class="ph ph-caret-left"></i></button>
                    <h2 class="text-lg md:text-xl font-bold w-32 md:w-48 text-center truncate" id="current-date-display">Hoy</h2>
                    <button onclick="changeDate(1)" class="p-2 hover:bg-gray-100 rounded-lg text-gray-600 transition-colors"><i class="ph ph-caret-right"></i></button>
                </div>
                <div class="bg-gray-100 p-1 rounded-xl flex gap-1">
                    <button onclick="setCalendarView('daily')" id="btn-view-daily" class="px-3 md:px-4 py-1.5 rounded-lg text-xs md:text-sm font-medium bg-white shadow-sm text-gray-800">Día</button>
                    <button onclick="setCalendarView('weekly')" id="btn-view-weekly" class="px-3 md:px-4 py-1.5 rounded-lg text-xs md:text-sm font-medium text-gray-500 hover:text-gray-800">Semana</button>
                </div>
            </div>

            <!-- Calendar Container -->
            <div class="flex-1 overflow-y-auto overflow-x-hidden p-2 md:p-4" id="calendar-scroll-area">
                <!-- Daily View -->
                <div id="daily-view" class="w-full bg-white rounded-xl md:rounded-2xl border border-gray-200 shadow-sm overflow-hidden relative">
                    <div class="flex">
                        <!-- Hours Column -->
                        <div class="w-16 md:w-24 border-r border-gray-200 shrink-0 text-right pr-2 md:pr-4" id="daily-hours">
                            <!-- Generated by JS -->
                        </div>
                        <!-- Grid Area -->
                        <div class="flex-1 calendar-grid relative min-h-[1440px]" id="daily-grid">
                            <!-- Current Time Line -->
                            <div id="current-time-line" class="absolute left-0 right-0 border-t-2 border-red-500 z-10 hide pointer-events-none">
                                <div class="w-2.5 h-2.5 rounded-full bg-red-500 absolute -left-1.5 -top-[5px]"></div>
                            </div>
                            <!-- Events generated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Weekly View -->
                <div id="weekly-view" class="w-full hide">
                    <div class="grid grid-cols-1 md:grid-cols-7 gap-4" id="weekly-grid">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- View: Reports -->
        <div id="view-reports" class="flex-1 flex flex-col h-full overflow-hidden hide">
            <div class="px-4 md:px-6 py-6 md:py-8 max-w-4xl mx-auto w-full overflow-y-auto">
                <h2 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8 text-gray-800">Informes</h2>
                
                <div class="bg-white p-4 md:p-6 rounded-2xl border border-gray-100 shadow-sm mb-6">
                    <h3 class="text-base md:text-lg font-semibold mb-4 text-gray-800">Filtrar por periodo</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-600 mb-1">Fecha Inicio</label>
                            <input type="date" id="export-start" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-600 mb-1">Fecha Fin</label>
                            <input type="date" id="export-end" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none text-sm">
                        </div>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-3 md:gap-4">
                        <button onclick="exportPDF()" class="flex-1 bg-red-50 hover:bg-red-100 text-red-700 font-semibold py-2.5 md:py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors border border-red-200 text-sm md:text-base">
                            <i class="ph ph-file-pdf text-lg md:text-xl"></i> Exportar a PDF
                        </button>
                        <button onclick="exportExcel()" class="flex-1 bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-2.5 md:py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors border border-green-200 text-sm md:text-base">
                            <i class="ph ph-file-xls text-lg md:text-xl"></i> Exportar a Excel
                        </button>
                    </div>
                </div>

                <!-- Resumen rápido -->
                <div class="grid grid-cols-2 gap-3 md:gap-4">
                    <div class="bg-white p-4 md:p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-xs md:text-sm text-gray-500 font-medium">Horas totales</p>
                        <p class="text-2xl md:text-3xl font-bold text-gray-800 mt-1" id="report-total-hours">0h 0m</p>
                    </div>
                    <div class="bg-white p-4 md:p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-xs md:text-sm text-gray-500 font-medium">Tareas completadas</p>
                        <p class="text-2xl md:text-3xl font-bold text-gray-800 mt-1" id="report-total-tasks">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- View: Settings -->
        <div id="view-settings" class="flex-1 flex flex-col h-full overflow-y-auto hide">
            <div class="px-4 md:px-6 py-6 md:py-8 max-w-3xl mx-auto w-full">
                <h2 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8 text-gray-800">Configuración</h2>
                
                <!-- Perfil -->
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-6">
                    <div class="p-4 md:p-6 border-b border-gray-100 bg-gray-50/50">
                        <h3 class="text-base md:text-lg font-semibold text-gray-800">Perfil del Usuario</h3>
                    </div>
                    <div class="p-4 md:p-6 space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs md:text-sm font-medium text-gray-600 mb-1">Nombre y apellidos</label>
                                <input type="text" id="profile-name" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs md:text-sm font-medium text-gray-600 mb-1">Cargo</label>
                                <input type="text" id="profile-role" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs md:text-sm font-medium text-gray-600 mb-1">Departamento</label>
                                <input type="text" id="profile-dept" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs md:text-sm font-medium text-gray-600 mb-1">Horario laboral</label>
                                <input type="text" id="profile-hours" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none text-sm" placeholder="Ej. 08:00 - 17:00">
                            </div>
                        </div>
                        <div class="flex justify-end mt-4">
                            <button onclick="saveProfile()" class="bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 px-5 rounded-xl transition-colors text-sm shadow-sm">Guardar Perfil</button>
                        </div>
                    </div>
                </div>

                <!-- Tipos de tareas -->
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-6">
                    <div class="p-4 md:p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                        <h3 class="text-base md:text-lg font-semibold text-gray-800">Tipos de Tareas</h3>
                        <button onclick="openTypeModal()" class="text-brand-600 hover:text-brand-700 font-medium text-xs md:text-sm flex items-center gap-1 bg-brand-50 px-3 py-1.5 rounded-lg transition-colors">
                            <i class="ph ph-plus"></i> Añadir
                        </button>
                    </div>
                    <div class="p-0">
                        <ul id="task-types-list" class="divide-y divide-gray-50">
                            <!-- Generated by JS -->
                        </ul>
                    </div>
                </div>

                <!-- Backup & Restore moved here for mobile accessibility -->
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="p-4 md:p-6 border-b border-gray-100 bg-gray-50/50">
                        <h3 class="text-base md:text-lg font-semibold text-gray-800">Copia de Seguridad</h3>
                        <p class="text-xs text-gray-500 mt-1">Guarda o restaura los datos de tu dispositivo.</p>
                    </div>
                    <div class="p-4 md:p-6 flex flex-col sm:flex-row gap-3">
                        <button onclick="exportJSON()" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-gray-700 bg-white hover:bg-gray-50 transition-colors border border-gray-200 font-medium text-sm">
                            <i class="ph ph-download-simple text-lg"></i> Exportar Copia
                        </button>
                        <label class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-gray-700 bg-white hover:bg-gray-50 transition-colors border border-gray-200 font-medium text-sm cursor-pointer">
                            <i class="ph ph-upload-simple text-lg"></i> Restaurar Datos
                            <input type="file" class="hidden" accept=".json" onchange="importJSON(event)">
                        </label>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- MODALS -->
    
    <!-- Task Modal (Create/Edit) -->
    <div id="modal-task" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-end md:items-center justify-center hide p-0 md:p-4 pb-0">
        <div class="bg-white rounded-t-3xl md:rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform transition-all fade-in max-h-[90vh] flex flex-col">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 shrink-0">
                <h3 class="font-bold text-lg text-gray-800" id="modal-task-title">Nueva Tarea</h3>
                <button onclick="closeModal('modal-task')" class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-lg hover:bg-gray-100"><i class="ph ph-x text-xl"></i></button>
            </div>
            
            <div class="p-5 overflow-y-auto">
                <!-- Tabs -->
                <div class="flex bg-gray-100 p-1 rounded-xl mb-5" id="task-tabs">
                    <button onclick="setTaskMode('timer')" id="tab-timer" class="flex-1 py-2 text-sm font-medium rounded-lg bg-white shadow-sm text-gray-800 transition-all">Cronómetro</button>
                    <button onclick="setTaskMode('manual')" id="tab-manual" class="flex-1 py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-800 transition-all">Manual</button>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Tipo de Tarea</label>
                        <select id="task-type" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none appearance-none font-medium">
                            <!-- Generated by JS -->
                        </select>
                    </div>

                    <div id="manual-fields" class="hide space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Fecha</label>
                            <input type="date" id="task-date" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Hora Inicio</label>
                                <input type="time" id="task-start" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Hora Fin</label>
                                <input type="time" id="task-end" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Observaciones (Opcional)</label>
                        <textarea id="task-notes" rows="2" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none resize-none" placeholder="Detalles de lo realizado..."></textarea>
                    </div>
                </div>
            </div>
            
            <div class="px-5 py-4 bg-gray-50/50 border-t border-gray-100 flex gap-3 justify-end pb-safe shrink-0">
                <button id="btn-delete-task" onclick="deleteCurrentTask()" class="hide mr-auto px-4 py-2 text-red-600 hover:bg-red-50 rounded-xl font-medium transition-colors text-sm">Eliminar</button>
                <button onclick="closeModal('modal-task')" class="px-4 py-2.5 text-gray-600 hover:bg-gray-100 rounded-xl font-medium transition-colors text-sm">Cancelar</button>
                <button onclick="saveTask()" id="btn-save-task" class="px-5 py-2.5 bg-brand-400 hover:bg-brand-500 text-brand-900 rounded-xl font-semibold shadow-sm transition-colors flex items-center gap-2 text-sm">
                    <i class="ph-fill ph-play"></i> Iniciar
                </button>
            </div>
        </div>
    </div>

    <!-- Type Modal (Create/Edit Type) -->
    <div id="modal-type" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-end md:items-center justify-center hide p-0 md:p-4 pb-0">
        <div class="bg-white rounded-t-3xl md:rounded-2xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all fade-in flex flex-col">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 shrink-0">
                <h3 class="font-bold text-lg text-gray-800" id="modal-type-title">Tipo de Tarea</h3>
                <button onclick="closeModal('modal-type')" class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-lg hover:bg-gray-100"><i class="ph ph-x text-xl"></i></button>
            </div>
            
            <div class="p-5 space-y-4 overflow-y-auto">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Nombre</label>
                    <input type="text" id="type-name" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-400 outline-none" placeholder="Ej. Reunión">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Color</label>
                    <div class="flex gap-2.5 flex-wrap" id="color-picker">
                        <!-- Colors inserted by JS -->
                    </div>
                </div>
            </div>
            
            <div class="px-5 py-4 bg-gray-50/50 border-t border-gray-100 flex gap-3 justify-end pb-safe shrink-0">
                 <button id="btn-delete-type" onclick="deleteCurrentType()" class="hide mr-auto px-4 py-2 text-red-600 hover:bg-red-50 rounded-xl font-medium transition-colors text-sm">Eliminar</button>
                <button onclick="closeModal('modal-type')" class="px-4 py-2.5 text-gray-600 hover:bg-gray-100 rounded-xl font-medium transition-colors text-sm">Cancelar</button>
                <button onclick="saveType()" class="px-5 py-2.5 bg-gray-800 hover:bg-gray-900 text-white rounded-xl font-semibold shadow-sm transition-colors text-sm">
                    Guardar
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-24 md:bottom-6 right-1/2 translate-x-1/2 md:translate-x-0 md:right-6 bg-gray-800 text-white px-4 py-3 rounded-xl shadow-lg transform transition-all translate-y-24 opacity-0 z-50 flex items-center gap-3 whitespace-nowrap">
        <i class="ph-fill ph-check-circle text-brand-400 text-xl" id="toast-icon"></i>
        <span id="toast-msg" class="font-medium text-sm"></span>
    </div>

    <!-- Scripts -->
    <script>
        dayjs.locale('es');

        // --- CONSTANTS & CONFIG ---
        const COLORS = [
            { bg: 'bg-blue-100', text: 'text-blue-700', border: 'border-blue-200', hex: '#dbeafe' },
            { bg: 'bg-purple-100', text: 'text-purple-700', border: 'border-purple-200', hex: '#f3e8ff' },
            { bg: 'bg-green-100', text: 'text-green-700', border: 'border-green-200', hex: '#dcfce7' },
            { bg: 'bg-brand-100', text: 'text-brand-800', border: 'border-brand-300', hex: '#fef9c3' },
            { bg: 'bg-rose-100', text: 'text-rose-700', border: 'border-rose-200', hex: '#ffe4e6' },
            { bg: 'bg-orange-100', text: 'text-orange-700', border: 'border-orange-200', hex: '#ffedd5' },
            { bg: 'bg-teal-100', text: 'text-teal-700', border: 'border-teal-200', hex: '#ccfbf1' },
            { bg: 'bg-gray-100', text: 'text-gray-700', border: 'border-gray-200', hex: '#f3f4f6' },
            { bg: 'bg-indigo-100', text: 'text-indigo-700', border: 'border-indigo-200', hex: '#e0e7ff' },
            { bg: 'bg-pink-100', text: 'text-pink-700', border: 'border-pink-200', hex: '#fce7f3' },
            { bg: 'bg-cyan-100', text: 'text-cyan-700', border: 'border-cyan-200', hex: '#cffafe' },
            { bg: 'bg-lime-100', text: 'text-lime-700', border: 'border-lime-200', hex: '#ecfccb' }
        ];

        const DEFAULT_TYPES = [
            { id: 't1', name: 'Desarrollo', colorIndex: 0, order: 0 },
            { id: 't2', name: 'Diseño', colorIndex: 1, order: 1 },
            { id: 't3', name: 'Reunión', colorIndex: 3, order: 2 },
            { id: 't4', name: 'Descanso', colorIndex: 2, order: 3 },
            { id: 't5', name: 'Gestión', colorIndex: 5, order: 4 }
        ];

        // --- STATE ---
        let appState = {
            currentDate: dayjs(),
            calendarView: 'daily', // 'daily', 'weekly'
            taskMode: 'timer', // 'timer', 'manual'
            editingTaskId: null,
            editingTypeId: null,
            activeTask: null, // task currently running
            tasks: [],
            types: [],
            selectedColorIndex: 0,
            profile: { name: '', role: '', dept: '', hours: '' }
        };

        let timerInterval;
        let clockInterval;

        // --- DATABASE (IndexedDB) ---
        const DB_NAME = 'WorkLoggerDB';
        const DB_VERSION = 1;
        let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('tasks')) {
                        const taskStore = db.createObjectStore('tasks', { keyPath: 'id' });
                        taskStore.createIndex('date', 'date', { unique: false });
                    }
                    if (!db.objectStoreNames.contains('types')) {
                        db.createObjectStore('types', { keyPath: 'id' });
                    }
                };

                request.onsuccess = async () => {
                    db = request.result;
                    // Seed initial types if empty
                    const types = await dbGetAll('types');
                    if (types.length === 0) {
                        for (const t of DEFAULT_TYPES) await dbPut('types', t);
                    }
                    resolve();
                };
                
                request.onerror = () => reject(request.error);
            });
        }

        function dbGetAll(storeName) {
            return new Promise((resolve) => {
                const transaction = db.transaction(storeName, 'readonly');
                const request = transaction.objectStore(storeName).getAll();
                request.onsuccess = () => resolve(request.result);
            });
        }

        function dbPut(storeName, item) {
            return new Promise((resolve) => {
                const transaction = db.transaction(storeName, 'readwrite');
                transaction.objectStore(storeName).put(item);
                transaction.oncomplete = () => resolve();
            });
        }

        function dbDelete(storeName, id) {
            return new Promise((resolve) => {
                const transaction = db.transaction(storeName, 'readwrite');
                transaction.objectStore(storeName).delete(id);
                transaction.oncomplete = () => resolve();
            });
        }

        // --- INITIALIZATION ---
        async function initApp() {
            await initDB();
            appState.types = await dbGetAll('types');
            appState.tasks = await dbGetAll('tasks');
            
            const savedProfile = localStorage.getItem('worklogger_profile');
            if (savedProfile) {
                try { appState.profile = JSON.parse(savedProfile); } catch (e) {}
            }
            
            // Check for active task
            appState.activeTask = appState.tasks.find(t => t.isActive);
            if (appState.activeTask) {
                startUITimer();
            }

            // Defaults for exports
            document.getElementById('export-start').value = dayjs().startOf('month').format('YYYY-MM-DD');
            document.getElementById('export-end').value = dayjs().endOf('month').format('YYYY-MM-DD');

            buildTypeSelectors();
            renderApp();

            // Setup current time line updater
            clockInterval = setInterval(updateCurrentTimeLine, 60000);
            updateCurrentTimeLine();
        }

        // --- NAVIGATION & VIEWS ---
        function navigate(view) {
            document.querySelectorAll('main > div[id^="view-"]').forEach(el => el.classList.add('hide'));
            document.getElementById(`view-${view}`).classList.remove('hide');
            
            // Update active DESKTOP nav styling
            document.querySelectorAll('aside nav button').forEach(btn => {
                btn.classList.remove('bg-brand-50', 'text-brand-900');
                btn.classList.add('text-gray-600');
            });
            const activeDesktopBtn = document.getElementById(`nav-${view}`);
            if(activeDesktopBtn) {
                activeDesktopBtn.classList.remove('text-gray-600', 'hover:bg-gray-50');
                activeDesktopBtn.classList.add('bg-brand-50', 'text-brand-900');
            }

            // Update active MOBILE nav styling
            const mobNavIds = ['calendar', 'reports', 'settings'];
            mobNavIds.forEach(id => {
                const btn = document.getElementById(`nav-mob-${id}`);
                const icon = document.getElementById(`icon-mob-${id}`);
                if (btn && icon) {
                    if (id === view) {
                        btn.classList.add('text-brand-600');
                        btn.classList.remove('text-gray-400');
                        icon.classList.remove('ph');
                        icon.classList.add('ph-fill');
                    } else {
                        btn.classList.add('text-gray-400');
                        btn.classList.remove('text-brand-600');
                        icon.classList.remove('ph-fill');
                        icon.classList.add('ph');
                    }
                }
            });

            if (view === 'reports') updateReportSummary();
        }

        function renderApp() {
            renderCalendar();
            renderSettings();
            updateReportSummary();
        }

        // --- CALENDAR ---
        function changeDate(delta) {
            if (appState.calendarView === 'daily') {
                appState.currentDate = appState.currentDate.add(delta, 'day');
            } else {
                appState.currentDate = appState.currentDate.add(delta, 'week');
            }
            renderCalendar();
        }

        function setCalendarView(view) {
            appState.calendarView = view;
            
            const btnDaily = document.getElementById('btn-view-daily');
            const btnWeekly = document.getElementById('btn-view-weekly');
            
            if (view === 'daily') {
                btnDaily.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                btnDaily.classList.remove('text-gray-500', 'hover:text-gray-800');
                btnWeekly.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
                btnWeekly.classList.add('text-gray-500', 'hover:text-gray-800');
                document.getElementById('daily-view').classList.remove('hide');
                document.getElementById('weekly-view').classList.add('hide');
                
                // Auto-scroll to morning (around 07:30 AM)
                setTimeout(() => {
                    const scrollArea = document.getElementById('calendar-scroll-area');
                    if (scrollArea.scrollTop === 0) scrollArea.scrollTop = 7.5 * 60;
                }, 10);
            } else {
                btnWeekly.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                btnWeekly.classList.remove('text-gray-500', 'hover:text-gray-800');
                btnDaily.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
                btnDaily.classList.add('text-gray-500', 'hover:text-gray-800');
                document.getElementById('weekly-view').classList.remove('hide');
                document.getElementById('daily-view').classList.add('hide');
            }
            renderCalendar();
        }

        function renderCalendar() {
            if (appState.calendarView === 'daily') {
                document.getElementById('current-date-display').innerText = 
                    appState.currentDate.isSame(dayjs(), 'day') ? 'Hoy' : appState.currentDate.format('D MMM YYYY');
                renderDailyView();
            } else {
                const start = appState.currentDate.startOf('week');
                const end = appState.currentDate.endOf('week');
                document.getElementById('current-date-display').innerText = 
                    `${start.format('D MMM')} - ${end.format('D MMM YYYY')}`;
                renderWeeklyView();
            }
        }

        function renderDailyView() {
            // Render hours if not done
            const hoursContainer = document.getElementById('daily-hours');
            if (hoursContainer.innerHTML.trim() === '') {
                let html = '';
                for (let i = 0; i < 24; i++) {
                    html += `<div class="h-[60px] relative"><span class="absolute top-0 right-2 md:right-3 time-label text-[10px] md:text-xs font-medium text-gray-500">${i === 0 ? '' : i.toString().padStart(2, '0')+':00'}</span></div>`;
                }
                hoursContainer.innerHTML = html;
                
                // Initial auto-scroll to 07:30 AM
                setTimeout(() => {
                    document.getElementById('calendar-scroll-area').scrollTop = 7.5 * 60;
                }, 50);
            }

            const grid = document.getElementById('daily-grid');
            // Remove old events, keep current time line
            Array.from(grid.children).forEach(child => {
                if (child.id !== 'current-time-line') child.remove();
            });

            const todayTasks = appState.tasks.filter(t => t.date === appState.currentDate.format('YYYY-MM-DD'));
            
            todayTasks.forEach(task => {
                const type = appState.types.find(t => t.id === task.typeId) || DEFAULT_TYPES[0];
                const colorDef = COLORS[type.colorIndex || 0];
                
                const startMins = task.startTime ? timeToMins(task.startTime) : 0;
                let endMins = task.endTime ? timeToMins(task.endTime) : (task.isActive ? timeToMins(dayjs().format('HH:mm')) : startMins + 60);
                
                if (endMins < startMins) endMins = 1440; // overflow midnight protection in simple view
                
                const top = startMins; // 1px = 1min
                const height = Math.max(endMins - startMins, 15); // min 15px

                const el = document.createElement('div');
                // Estilo Google Calendar: borde izquierdo fuerte (usa currentColor), radio a la derecha y hover opacity
                el.className = `absolute left-1 right-2 md:left-2 md:right-4 rounded-r-lg rounded-l-[3px] border-l-[4px] p-1.5 md:p-2.5 text-xs md:text-sm overflow-hidden cursor-pointer hover:opacity-90 transition-opacity ${colorDef.bg} ${colorDef.text} ${task.isActive ? 'animate-pulse ring-2 ring-brand-400' : ''}`;
                el.style.top = `${top}px`;
                el.style.height = `${height}px`;
                el.style.borderLeftColor = 'currentColor'; 
                el.onclick = () => openTaskModal(task);
                
                const durationText = task.isActive ? 'En curso...' : formatDuration(endMins - startMins);
                const timeText = task.isActive ? `${task.startTime} - ...` : `${task.startTime} - ${task.endTime}`;

                el.innerHTML = `
                    <div class="flex flex-col h-full truncate">
                        <div class="font-semibold flex items-center gap-1.5 truncate leading-tight">
                            ${type.name}
                        </div>
                        ${height >= 30 ? `<div class="text-[10px] md:text-xs opacity-80 mt-0.5 truncate leading-tight">${timeText}</div>` : ''}
                    </div>
                `;
                grid.appendChild(el);
            });

            updateCurrentTimeLine();
        }

        function renderWeeklyView() {
            const startOfWeek = appState.currentDate.startOf('week');
            const grid = document.getElementById('weekly-grid');
            grid.innerHTML = '';

            for (let i = 0; i < 7; i++) {
                const day = startOfWeek.add(i, 'day');
                const isToday = day.isSame(dayjs(), 'day');
                const dateStr = day.format('YYYY-MM-DD');
                const dayTasks = appState.tasks.filter(t => t.date === dateStr).sort((a,b) => timeToMins(a.startTime) - timeToMins(b.startTime));
                
                const col = document.createElement('div');
                col.className = 'bg-white rounded-2xl border border-gray-100 shadow-sm p-3 md:p-4 flex flex-col min-h-[150px] md:min-h-[300px]';
                
                let html = `
                    <div class="text-center mb-3 pb-2 border-b border-gray-50">
                        <div class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">${day.format('ddd')}</div>
                        <div class="text-lg md:text-xl font-bold ${isToday ? 'text-brand-500' : 'text-gray-800'}">${day.format('D')}</div>
                    </div>
                    <div class="flex-1 flex flex-col gap-2 overflow-y-auto">
                `;

                if (dayTasks.length === 0) {
                    html += `<div class="text-[10px] md:text-xs text-gray-400 text-center italic mt-2">Sin tareas</div>`;
                }

                dayTasks.forEach(task => {
                    const type = appState.types.find(t => t.id === task.typeId) || DEFAULT_TYPES[0];
                    const colorDef = COLORS[type.colorIndex || 0];
                    const startMins = timeToMins(task.startTime);
                    const endMins = task.endTime ? timeToMins(task.endTime) : (task.isActive ? timeToMins(dayjs().format('HH:mm')) : startMins);
                    const durationText = task.isActive ? 'En curso' : formatDuration(endMins - startMins);

                    html += `
                        <div onclick="openTaskModalById('${task.id}')" class="p-2 rounded-xl text-[10px] md:text-xs cursor-pointer border ${colorDef.bg} ${colorDef.text} ${colorDef.border} hover:opacity-80 transition-opacity">
                            <div class="font-bold flex items-center gap-1 mb-0.5 truncate">${type.name}</div>
                            <div class="opacity-80 flex justify-between">
                                <span>${task.startTime}</span>
                                <span>${durationText}</span>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
                col.innerHTML = html;
                grid.appendChild(col);
            }
        }

        function openTaskModalById(id) {
            const task = appState.tasks.find(t => t.id === id);
            if (task) openTaskModal(task);
        }

        function updateCurrentTimeLine() {
            const line = document.getElementById('current-time-line');
            if (appState.calendarView !== 'daily' || !appState.currentDate.isSame(dayjs(), 'day')) {
                line.classList.add('hide');
                return;
            }
            line.classList.remove('hide');
            const now = dayjs();
            const top = (now.hour() * 60) + now.minute();
            line.style.top = `${top}px`;
        }

        // --- TASKS (CRUD & MODAL) ---
        function setTaskMode(mode) {
            appState.taskMode = mode;
            const tabTimer = document.getElementById('tab-timer');
            const tabManual = document.getElementById('tab-manual');
            const manualFields = document.getElementById('manual-fields');
            const btnSave = document.getElementById('btn-save-task');

            if (mode === 'timer') {
                tabTimer.className = 'flex-1 py-2 text-sm font-medium rounded-lg bg-white shadow-sm text-gray-800 transition-all';
                tabManual.className = 'flex-1 py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-800 transition-all';
                manualFields.classList.add('hide');
                btnSave.innerHTML = '<i class="ph-fill ph-play"></i> Iniciar';
                btnSave.className = 'px-5 py-2.5 bg-brand-400 hover:bg-brand-500 text-brand-900 rounded-xl font-semibold shadow-sm transition-colors flex items-center gap-2 text-sm';
            } else {
                tabManual.className = 'flex-1 py-2 text-sm font-medium rounded-lg bg-white shadow-sm text-gray-800 transition-all';
                tabTimer.className = 'flex-1 py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-800 transition-all';
                manualFields.classList.remove('hide');
                btnSave.innerHTML = 'Guardar';
                btnSave.className = 'px-5 py-2.5 bg-gray-800 hover:bg-gray-900 text-white rounded-xl font-semibold shadow-sm transition-colors flex items-center gap-2 text-sm';
            }
        }

        function openTaskModal(task = null) {
            appState.editingTaskId = task ? task.id : null;
            document.getElementById('modal-task-title').innerText = task ? 'Editar Tarea' : 'Nueva Tarea';
            
            const btnDelete = document.getElementById('btn-delete-task');
            if (task && !task.isActive) {
                btnDelete.classList.remove('hide');
            } else {
                btnDelete.classList.add('hide');
            }

            // Popluate types select
            const select = document.getElementById('task-type');
            select.innerHTML = appState.types.sort((a,b)=>a.order-b.order).map(t => 
                `<option value="${t.id}">${t.name}</option>`
            ).join('');

            if (task) {
                select.value = task.typeId;
                document.getElementById('task-notes').value = task.notes || '';
                
                if (task.isActive) {
                    setTaskMode('timer'); // can't edit times if active via manual easily in this simple flow
                    document.getElementById('task-tabs').classList.add('hide'); // hide tabs if active
                } else {
                    document.getElementById('task-tabs').classList.remove('hide');
                    setTaskMode('manual');
                    document.getElementById('task-date').value = task.date;
                    document.getElementById('task-start').value = task.startTime;
                    document.getElementById('task-end').value = task.endTime;
                }
            } else {
                document.getElementById('task-tabs').classList.remove('hide');
                // Defaults for new
                if(appState.activeTask) {
                     setTaskMode('manual'); // force manual if timer is running
                     document.getElementById('task-tabs').classList.add('hide');
                } else {
                    setTaskMode('timer');
                }
                document.getElementById('task-date').value = appState.currentDate.format('YYYY-MM-DD');
                document.getElementById('task-start').value = dayjs().format('HH:mm');
                document.getElementById('task-end').value = dayjs().add(1, 'hour').format('HH:mm');
                document.getElementById('task-notes').value = '';
            }

            document.getElementById('modal-task').classList.remove('hide');
        }

        async function saveTask() {
            const typeId = document.getElementById('task-type').value;
            const notes = document.getElementById('task-notes').value.trim();

            let taskData = {
                id: appState.editingTaskId || `task_${Date.now()}`,
                typeId: typeId,
                notes: notes,
                date: dayjs().format('YYYY-MM-DD'),
                startTime: null,
                endTime: null,
                isActive: false
            };

            if (appState.editingTaskId) {
                const existing = appState.tasks.find(t => t.id === appState.editingTaskId);
                taskData = { ...existing, typeId, notes };
            }

            if (appState.taskMode === 'timer' && !appState.editingTaskId) {
                // Start Timer
                taskData.startTime = dayjs().format('HH:mm');
                taskData.isActive = true;
                taskData.fullStartTime = dayjs().toISOString(); // for precise duration
                appState.activeTask = taskData;
                startUITimer();
            } else if (appState.taskMode === 'manual') {
                taskData.date = document.getElementById('task-date').value;
                taskData.startTime = document.getElementById('task-start').value;
                taskData.endTime = document.getElementById('task-end').value;
                taskData.isActive = false;
                
                // Validate
                if (!taskData.date || !taskData.startTime || !taskData.endTime) {
                    showToast('Completa todos los campos manuales', true);
                    return;
                }
                if (taskData.startTime >= taskData.endTime) {
                    showToast('La hora de fin debe ser posterior al inicio', true);
                    return;
                }
            }

            await dbPut('tasks', taskData);
            
            if (appState.editingTaskId) {
                appState.tasks = appState.tasks.map(t => t.id === taskData.id ? taskData : t);
                showToast('Tarea actualizada');
            } else {
                appState.tasks.push(taskData);
                showToast('Tarea guardada');
            }

            closeModal('modal-task');
            renderCalendar();
            if(!document.getElementById('view-reports').classList.contains('hide')) updateReportSummary();
        }

        async function deleteCurrentTask() {
            if (!appState.editingTaskId) return;
            if (confirm('¿Seguro que deseas eliminar esta tarea?')) {
                await dbDelete('tasks', appState.editingTaskId);
                appState.tasks = appState.tasks.filter(t => t.id !== appState.editingTaskId);
                closeModal('modal-task');
                renderCalendar();
                showToast('Tarea eliminada');
                if(!document.getElementById('view-reports').classList.contains('hide')) updateReportSummary();
            }
        }

        // --- TIMER LOGIC ---
        function startUITimer() {
            const banner = document.getElementById('active-timer-banner');
            const titleEl = document.getElementById('active-timer-title');
            const displayEl = document.getElementById('active-timer-display');
            
            banner.classList.remove('hide');
            const type = appState.types.find(t => t.id === appState.activeTask.typeId) || DEFAULT_TYPES[0];
            titleEl.innerHTML = `${type.name}`;

            if (timerInterval) clearInterval(timerInterval);
            
            const start = dayjs(appState.activeTask.fullStartTime || dayjs(`${appState.activeTask.date}T${appState.activeTask.startTime}`));
            
            const updateDisplay = () => {
                const now = dayjs();
                const diff = now.diff(start, 'second');
                const hrs = Math.floor(diff / 3600).toString().padStart(2, '0');
                const mins = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const secs = (diff % 60).toString().padStart(2, '0');
                displayEl.innerText = `${hrs}:${mins}:${secs}`;
            };
            
            updateDisplay();
            timerInterval = setInterval(updateDisplay, 1000);
            renderCalendar();
        }

        async function stopTimer() {
            if (!appState.activeTask) return;
            
            clearInterval(timerInterval);
            appState.activeTask.endTime = dayjs().format('HH:mm');
            appState.activeTask.isActive = false;
            
            await dbPut('tasks', appState.activeTask);
            
            // update in local state
            const idx = appState.tasks.findIndex(t => t.id === appState.activeTask.id);
            if (idx > -1) appState.tasks[idx] = appState.activeTask;

            appState.activeTask = null;
            document.getElementById('active-timer-banner').classList.add('hide');
            showToast('Tarea finalizada');
            renderCalendar();
            if(!document.getElementById('view-reports').classList.contains('hide')) updateReportSummary();
        }


        // --- SETTINGS (TASK TYPES) ---
        function saveProfile() {
            appState.profile = {
                name: document.getElementById('profile-name').value.trim(),
                role: document.getElementById('profile-role').value.trim(),
                dept: document.getElementById('profile-dept').value.trim(),
                hours: document.getElementById('profile-hours').value.trim()
            };
            localStorage.setItem('worklogger_profile', JSON.stringify(appState.profile));
            showToast('Perfil guardado correctamente');
        }

        function renderSettings() {
            document.getElementById('profile-name').value = appState.profile.name || '';
            document.getElementById('profile-role').value = appState.profile.role || '';
            document.getElementById('profile-dept').value = appState.profile.dept || '';
            document.getElementById('profile-hours').value = appState.profile.hours || '';

            const list = document.getElementById('task-types-list');
            list.innerHTML = '';
            
            appState.types.sort((a,b) => a.order - b.order).forEach((type, index) => {
                const colorDef = COLORS[type.colorIndex || 0];
                const typeInitial = type.name.charAt(0).toUpperCase();
                const li = document.createElement('li');
                li.className = 'px-4 md:px-6 py-3 md:py-4 flex items-center justify-between hover:bg-gray-50 transition-colors group bg-white';
                li.innerHTML = `
                    <div class="flex items-center gap-3 md:gap-4">
                        <div class="text-gray-300 hover:text-gray-500 cursor-grab px-1 hidden md:block"><i class="ph ph-dots-six-vertical"></i></div>
                        <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl flex items-center justify-center text-sm md:text-base font-bold shadow-sm ${colorDef.bg} ${colorDef.text}">
                            ${typeInitial}
                        </div>
                        <span class="font-semibold text-sm md:text-base text-gray-800">${type.name}</span>
                    </div>
                    <button onclick="openTypeModal('${type.id}')" class="p-2 text-gray-400 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition-colors md:opacity-0 md:group-hover:opacity-100 focus:opacity-100">
                        <i class="ph-bold ph-pencil-simple text-lg"></i>
                    </button>
                `;
                list.appendChild(li);
            });
        }

        function buildTypeSelectors() {
            // Colors
            const colorPicker = document.getElementById('color-picker');
            colorPicker.innerHTML = COLORS.map((c, i) => `
                <button onclick="selectColor(${i})" type="button" id="color-btn-${i}" class="w-7 h-7 md:w-8 md:h-8 rounded-full ${c.bg} border-2 ${c.border} flex items-center justify-center transition-transform hover:scale-110">
                    <i class="ph-bold ph-check text-[10px] md:text-xs ${c.text} hide" id="color-check-${i}"></i>
                </button>
            `).join('');
        }

        function selectColor(index) {
            appState.selectedColorIndex = index;
            COLORS.forEach((_, i) => {
                const btn = document.getElementById(`color-btn-${i}`);
                const check = document.getElementById(`color-check-${i}`);
                if (i === index) {
                    btn.classList.add('ring-2', 'ring-offset-2', 'ring-gray-400');
                    check.classList.remove('hide');
                } else {
                    btn.classList.remove('ring-2', 'ring-offset-2', 'ring-gray-400');
                    check.classList.add('hide');
                }
            });
        }

        function selectIcon(icon) {
            appState.selectedIcon = icon;
            ICONS.forEach(i => {
                const btn = document.getElementById(`icon-btn-${i}`);
                if (i === icon) {
                    btn.classList.add('bg-gray-100', 'border-gray-300', 'text-gray-800');
                    btn.classList.remove('border-transparent');
                } else {
                    btn.classList.remove('bg-gray-100', 'border-gray-300', 'text-gray-800');
                    btn.classList.add('border-transparent');
                }
            });
        }

        function openTypeModal(id = null) {
            appState.editingTypeId = id;
            document.getElementById('modal-type-title').innerText = id ? 'Editar Tipo' : 'Nuevo Tipo';
            
            const btnDelete = document.getElementById('btn-delete-type');
            if(id) btnDelete.classList.remove('hide'); else btnDelete.classList.add('hide');

            if (id) {
                const type = appState.types.find(t => t.id === id);
                document.getElementById('type-name').value = type.name;
                selectColor(type.colorIndex || 0);
            } else {
                document.getElementById('type-name').value = '';
                selectColor(0);
            }
            
            document.getElementById('modal-type').classList.remove('hide');
        }

        async function saveType() {
            const name = document.getElementById('type-name').value.trim();
            if (!name) return showToast('El nombre es obligatorio', true);

            let typeData = {
                id: appState.editingTypeId || `type_${Date.now()}`,
                name: name,
                colorIndex: appState.selectedColorIndex,
                order: appState.editingTypeId ? appState.types.find(t=>t.id===appState.editingTypeId).order : appState.types.length
            };

            await dbPut('types', typeData);
            
            if (appState.editingTypeId) {
                appState.types = appState.types.map(t => t.id === typeData.id ? typeData : t);
                showToast('Tipo actualizado');
            } else {
                appState.types.push(typeData);
                showToast('Tipo creado');
            }

            closeModal('modal-type');
            renderSettings();
            renderCalendar(); // Reflect changes immediately
        }

        async function deleteCurrentType() {
            if (!appState.editingTypeId) return;
            // Prevent deleting if in use
            const inUse = appState.tasks.some(t => t.typeId === appState.editingTypeId);
            if (inUse) {
                alert('No se puede eliminar porque hay tareas registradas con este tipo. Cambia las tareas primero o elimina este tipo en el futuro.');
                return;
            }

            if (confirm('¿Seguro que deseas eliminar este tipo de tarea?')) {
                await dbDelete('types', appState.editingTypeId);
                appState.types = appState.types.filter(t => t.id !== appState.editingTypeId);
                closeModal('modal-type');
                renderSettings();
                showToast('Tipo eliminado');
            }
        }

        // --- REPORTS & EXPORTS ---
        function updateReportSummary() {
            const start = document.getElementById('export-start').value;
            const end = document.getElementById('export-end').value;
            
            const filteredTasks = appState.tasks.filter(t => {
                if(t.isActive) return false;
                return t.date >= start && t.date <= end;
            });

            let totalMins = 0;
            filteredTasks.forEach(t => {
                totalMins += (timeToMins(t.endTime) - timeToMins(t.startTime));
            });

            document.getElementById('report-total-tasks').innerText = filteredTasks.length;
            document.getElementById('report-total-hours').innerText = formatDuration(totalMins);
        }

        // Add listeners to date inputs
        document.getElementById('export-start').addEventListener('change', updateReportSummary);
        document.getElementById('export-end').addEventListener('change', updateReportSummary);

        function exportPDF() {
            const start = document.getElementById('export-start').value;
            const end = document.getElementById('export-end').value;
            
            const filteredTasks = appState.tasks.filter(t => !t.isActive && t.date >= start && t.date <= end)
                                                .sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header
            doc.setFontSize(22);
            doc.setTextColor(33, 33, 33);
            doc.text("Informe de Actividad Laboral", 14, 20);
            
            doc.setFontSize(11);
            doc.setTextColor(100, 100, 100);
            doc.text(`Periodo: ${dayjs(start).format('DD/MM/YYYY')} a ${dayjs(end).format('DD/MM/YYYY')}`, 14, 28);
            doc.text(`Generado: ${dayjs().format('DD/MM/YYYY HH:mm')}`, 14, 34);

            let currentY = 44;
            if (appState.profile.name || appState.profile.role || appState.profile.dept || appState.profile.hours) {
                doc.setFontSize(10);
                doc.setTextColor(50, 50, 50);
                if (appState.profile.name) { doc.text(`Nombre: ${appState.profile.name}`, 14, currentY); currentY += 6; }
                if (appState.profile.role) { doc.text(`Cargo: ${appState.profile.role}`, 14, currentY); currentY += 6; }
                if (appState.profile.dept) { doc.text(`Departamento: ${appState.profile.dept}`, 14, currentY); currentY += 6; }
                if (appState.profile.hours) { doc.text(`Horario: ${appState.profile.hours}`, 14, currentY); currentY += 6; }
            }
            currentY += 4;

            // Table
            const tableData = filteredTasks.map(t => {
                const type = appState.types.find(type => type.id === t.typeId) || {name: 'Desconocido'};
                const dur = formatDuration(timeToMins(t.endTime) - timeToMins(t.startTime));
                return [
                    dayjs(t.date).format('DD/MM/YYYY'),
                    type.name,
                    t.startTime,
                    t.endTime,
                    dur,
                    t.notes || ''
                ];
            });

            doc.autoTable({
                startY: currentY,
                head: [['Fecha', 'Tarea', 'Inicio', 'Fin', 'Duración', 'Observaciones']],
                body: tableData,
                theme: 'striped',
                headStyles: { fillColor: [250, 204, 21], textColor: [113, 63, 18] }, // Yellow Brand
                styles: { fontSize: 9, font: 'helvetica' },
                columnStyles: { 5: { cellWidth: 50 } }
            });

            // Summary
            let totalMins = filteredTasks.reduce((acc, t) => acc + (timeToMins(t.endTime) - timeToMins(t.startTime)), 0);
            doc.setFontSize(12);
            doc.setTextColor(33, 33, 33);
            doc.text(`Total de horas: ${formatDuration(totalMins)}`, 14, doc.lastAutoTable.finalY + 15);
            doc.text(`Total tareas: ${filteredTasks.length}`, 14, doc.lastAutoTable.finalY + 22);

            doc.save(`WorkLog_${start}_${end}.pdf`);
            showToast('PDF Exportado');
        }

        function exportExcel() {
            const start = document.getElementById('export-start').value;
            const end = document.getElementById('export-end').value;
            
            const filteredTasks = appState.tasks.filter(t => !t.isActive && t.date >= start && t.date <= end)
                                                .sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));

            const data = filteredTasks.map(t => {
                const type = appState.types.find(type => type.id === t.typeId) || {name: 'Desconocido'};
                const durMins = timeToMins(t.endTime) - timeToMins(t.startTime);
                return {
                    'Fecha': dayjs(t.date).format('DD/MM/YYYY'),
                    'Tipo de Tarea': type.name,
                    'Hora Inicio': t.startTime,
                    'Hora Fin': t.endTime,
                    'Duración (Minutos)': durMins,
                    'Duración (Format)': formatDuration(durMins),
                    'Observaciones': t.notes || ''
                };
            });

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Actividad");
            XLSX.writeFile(wb, `WorkLog_${start}_${end}.xlsx`);
            showToast('Excel Exportado');
        }

        // --- BACKUP ---
        function exportJSON() {
            const data = {
                version: 1,
                timestamp: new Date().toISOString(),
                profile: appState.profile,
                types: appState.types,
                tasks: appState.tasks
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `DiarioLaboral_Backup_${dayjs().format('YYYYMMDD')}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Copia de seguridad descargada');
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.types || !data.tasks) throw new Error("Formato inválido");

                    if (confirm('Esto reemplazará todos tus datos actuales. ¿Continuar?')) {
                        // Clear DB
                        const oldTasks = await dbGetAll('tasks');
                        for(const t of oldTasks) await dbDelete('tasks', t.id);
                        const oldTypes = await dbGetAll('types');
                        for(const t of oldTypes) await dbDelete('types', t.id);

                        // Insert new
                        for(const t of data.types) await dbPut('types', t);
                        for(const t of data.tasks) await dbPut('tasks', t);

                        appState.types = data.types;
                        appState.tasks = data.tasks;
                        
                        if (data.profile) {
                            appState.profile = data.profile;
                            localStorage.setItem('worklogger_profile', JSON.stringify(appState.profile));
                        }
                        
                        appState.activeTask = appState.tasks.find(t => t.isActive);
                        if(appState.activeTask) startUITimer();
                        else document.getElementById('active-timer-banner').classList.add('hide');

                        renderApp();
                        showToast('Datos restaurados correctamente');
                    }
                } catch (err) {
                    alert('Error al leer el archivo JSON: ' + err.message);
                }
                event.target.value = ''; // reset
            };
            reader.readAsText(file);
        }

        // --- UTILS ---
        function timeToMins(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function formatDuration(mins) {
            if (mins < 0) return '0h 0m'; // Safe guard
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            if (h === 0) return `${m}m`;
            if (m === 0) return `${h}h`;
            return `${h}h ${m}m`;
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hide');
        }

        let toastTimeout;
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            const icon = document.getElementById('toast-icon');
            
            if (isError) {
                icon.className = 'ph-fill ph-warning-circle text-red-400 text-xl';
                toast.classList.replace('bg-gray-800', 'bg-red-900');
            } else {
                icon.className = 'ph-fill ph-check-circle text-brand-400 text-xl';
                toast.classList.replace('bg-red-900', 'bg-gray-800');
            }

            toast.classList.remove('translate-y-24', 'opacity-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 3000);
        }

        // --- INIT ---
        window.onload = initApp;

    </script>
</body>
